server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zelia.io www.zelia.io;

    root /root/apps/zelia/client/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/zelia.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zelia.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /root/apps/zelia/client/dist/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        alias /root/apps/zelia/client/dist/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5051/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Dynamic formation sitemaps (~130k pages) must be served at the site
    # root because a sitemap can only reference URLs at or below its own
    # path — the actual pages live at /formations/... . These are generated
    # on-demand by the Express API (see server/routes/sitemap.js).
    location ~ ^/(sitemap-index\.xml|sitemap-formations-\d+\.xml)$ {
        proxy_pass http://127.0.0.1:5051/api/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Root-level static files (favicon-adjacent assets, overrides.css, etc.)
    # weren't covered by the /static/ or /assets/ cache rules above, so they
    # fell back to no explicit Cache-Control. This is a plain caching hint —
    # it doesn't change what's served, only how long browsers may reuse it.
    location ~* ^/[^/]+\.(?:css|js|ico|svg|png|jpg|jpeg|webp|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name zelia.io www.zelia.io;
    return 301 https://zelia.io$request_uri;
}
